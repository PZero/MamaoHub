<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaMaoDash | Dashboard Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MAMAO<span style="color: var(--text-main)">DASH</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="theme-toggle" class="theme-toggle">🌓 LIGHT MODE</button>
            <button id="settings-toggle" class="theme-toggle">⚙️ SETUP</button>
            <div class="status-bar">
                <div class="status-item">
                    <div class="dot"></div>
                    <span id="mode-label">SIMULATORE</span>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-layout">
        <!-- Colonna Sinistra -->
        <div class="side-col left">
            <section class="widget depth-widget">
                <div class="widget-label">Depth</div>
                <div class="value-row large">
                    <span id="depth">10.8</span><span class="unit">m</span>
                </div>
            </section>
            <section class="widget stw-widget">
                <div class="widget-label">STW</div>
                <div class="value-row large">
                    <span id="sog">6.1</span><span class="unit">knots</span>
                </div>
                <div class="min-max">Min: 5.2 Max: 6.1</div>
            </section>
            <section class="widget pos-widget">
                <div class="widget-label">Position</div>
                <div class="coords" id="position">
                    44° 24.89' N<br>
                    8° 54.77' E
                </div>
            </section>
        </div>

        <!-- Colonna Centrale -->
        <div class="center-col">
            <div class="nav-top-info">
                <div class="info-item">
                    <span class="label orange">AWS</span>
                    <span class="val orange"><span id="aws-val">12.4</span> <small>knots</small></span>
                </div>
                <div class="hdg-box">
                    <span id="hdg-num">179</span>°
                </div>
                <div class="info-item">
                    <span class="label yellow">TWS</span>
                    <span class="val yellow"><span id="tws">0.0</span> <small>knots</small></span>
                </div>
            </div>
            <div class="nav-display-container" id="nav-display-box">
                <!-- NavDisplay SVG -->
            </div>
            <div class="nav-bottom-info">
                <span>House Bank</span>
                <span id="battery">--.-V</span>
            </div>
        </div>

        <!-- Colonna Destra -->
        <div class="side-col right">
            <section class="widget sog-gauge-widget">
                <div class="gauge-container" id="sog-gauge-box">
                    <!-- Analog SOG Gauge -->
                </div>
            </section>
            <section class="widget graph-widget">
                <div class="widget-label orange" id="graph-label">12.4 knots</div>
                <div class="graph-placeholder">
                    <!-- Graph Canvas or SVG -->
                </div>
            </section>
        </div>
    </main>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>SETUP DASHBOARD</h3>
            <button id="settings-close">×</button>
        </div>
        <div class="settings-content">
            <!-- Sezione Generale -->
            <div class="settings-section">
                <h4>Generale</h4>
                <div class="color-group">
                    <label>Sfondo</label>
                    <input type="color" data-var="--bg-color">
                </div>
                <div class="color-group">
                    <label>Colore Etichette</label>
                    <input type="color" data-var="--color-labels">
                </div>
            </div>

            <!-- Sezione Colonna Sinistra -->
            <div class="settings-section">
                <h4>Colonna Sinistra</h4>
                <div class="color-group">
                    <label>Profondità</label>
                    <input type="color" data-var="--color-depth">
                </div>
                <div class="color-group">
                    <label>STW</label>
                    <input type="color" data-var="--color-stw">
                </div>
                <div class="color-group">
                    <label>Posizione</label>
                    <input type="color" data-var="--color-pos">
                </div>
            </div>

            <!-- Sezione Accenti -->
            <div class="settings-section">
                <h4>Accenti & UI</h4>
                <div class="color-group">
                    <label>Ciano (Nav)</label>
                    <input type="color" data-var="--accent-cyan">
                </div>
                <div class="color-group">
                    <label>Arancio (Vento)</label>
                    <input type="color" data-var="--accent-orange">
                </div>
            </div>

            <button id="reset-colors" class="reset-btn">RIPRISTINA DEFAULT</button>
        </div>
    </div>

    <script src="widgets.js"></script>
    <script src="app.js"></script>
</body>
</html>
