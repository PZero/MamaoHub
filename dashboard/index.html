<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaMaoDash | Dashboard Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header>
        <div class="logo">MAMAO<span style="color: var(--text-main)">DASH</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="theme-toggle" class="theme-toggle">🌓 LIGHT MODE</button>
            <button id="settings-toggle" class="theme-toggle">⚙️ SETUP</button>
            <div class="status-bar">
                <div class="status-item">
                    <div class="dot"></div>
                    <span id="mode-label">SIMULATORE</span>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-layout">
        <!-- Colonna Sinistra -->
        <div class="side-col left" id="left-col">
            <!-- Widgets will be injected here -->
        </div>

        <!-- Colonna Centrale -->
        <div class="center-col">
            <div class="nav-top-info">
                <div class="info-item">
                    <span class="label orange">AWS</span>
                    <div class="val orange">
                        <span id="aws-val">12.4</span>
                        <small>knots</small>
                    </div>
                </div>
                <div class="hdg-box">
                    <span id="hdg-num">179</span>°
                </div>
                <div class="info-item">
                    <span class="label yellow">TWS</span>
                    <div class="val yellow">
                        <span id="tws">0.0</span>
                        <small>knots</small>
                    </div>
                </div>
            </div>
            <div class="nav-display-container" id="nav-display-box">
                <!-- NavDisplay SVG -->
            </div>
            <div class="nav-bottom-info">
                <span>House Bank</span>
                <span id="battery">--.-V</span>
            </div>
        </div>

        <!-- Colonna Destra -->
        <div class="side-col right" id="right-col">
            <!-- Widgets will be injected here -->
        </div>
    </main>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>SETUP DASHBOARD</h3>
            <button id="settings-close">×</button>
        </div>
        <div class="settings-content" style="max-height: 70vh; overflow-y: auto; padding-right: 10px;">
            <!-- Sezione Generale -->
            <div class="settings-section">
                <h4>Generale</h4>
                <div class="color-group">
                    <label>Modalità Dati</label>
                    <select id="data-mode-select" class="theme-toggle" style="width: auto; border-radius: 4px;">
                        <option value="sim">SIMULATORE</option>
                        <option value="real">DATI REALI</option>
                    </select>
                </div>
                <div class="color-group">
                    <label>Sfondo</label>
                    <input type="color" data-var="--bg-color">
                </div>
                <div class="color-group">
                    <label>Colore Etichette</label>
                    <input type="color" data-var="--color-labels">
                </div>
            </div>

            <!-- Sezione Bande Laterali -->
            <div class="settings-section">
                <h4>Bande Laterali (Sinistra & Destra)</h4>
                <div class="color-group">
                    <label>Colore Nomi Tag</label>
                    <input type="color" data-var="--side-label-color">
                </div>
                <div class="color-group">
                    <label>Dimensione Nomi Tag</label>
                    <input type="range" min="0.5" max="2" step="0.1" value="0.8" data-var="--side-label-size" data-unit="rem">
                </div>
                <div style="margin-bottom: 1rem;"></div>
                <div class="color-group">
                    <label>Colore Valori</label>
                    <input type="color" data-var="--side-value-color">
                </div>
                <div class="color-group">
                    <label>Dimensione Valori</label>
                    <input type="range" min="1" max="5" step="0.1" value="3" data-var="--side-value-size" data-unit="rem">
                </div>
                <div class="color-group">
                    <label>Altezza Left</label>
                    <input type="range" min="5" max="30" step="0.5" value="15" data-var="--left-widget-height" data-unit="vh">
                </div>
                <div class="color-group">
                    <label>Altezza Right</label>
                    <input type="range" min="5" max="30" step="0.5" value="15" data-var="--right-widget-height" data-unit="vh">
                </div>
            </div>

            <!-- Sezione Configurazione TAG -->
            <div class="settings-section">
                <h4>Configurazione TAG</h4>
                <div class="tags-config-container">
                    <table class="tags-config-table" id="tags-config-table">
                        <thead>
                            <tr>
                                <th>Tag</th>
                                <th>Colonna</th>
                                <th>Pos.</th>
                            </tr>
                        </thead>
                        <tbody id="tags-config-body">
                            <!-- Dynamic rows here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Sezione NavDisplay -->
            <div class="settings-section">
                <h4>NavDisplay</h4>
                <div class="color-group">
                    <label>Offset Verticale</label>
                    <input type="range" min="-100" max="100" step="1" value="0" data-var="--nav-display-offset" data-unit="px">
                </div>
                <div class="color-group">
                    <label>Scala</label>
                    <input type="range" min="0.5" max="1.5" step="0.05" value="1" data-var="--nav-display-scale">
                </div>
                <div class="color-group">
                    <label>SOG Vettore (Blu)</label>
                    <input type="color" data-var="--accent-blue">
                </div>
                <div class="color-group">
                    <label>Vento (Arancio)</label>
                    <input type="color" data-var="--accent-orange">
                </div>
                <div class="color-group">
                    <label>Layline Rossa</label>
                    <input type="color" data-var="--accent-red">
                </div>
                <div class="color-group">
                    <label>Layline Verde</label>
                    <input type="color" data-var="--accent-green">
                </div>
                <div class="color-group">
                    <label>Sagoma Barca</label>
                    <input type="color" data-var="--accent-cyan">
                </div>
            </div>

            <button id="reset-colors" class="reset-btn">RIPRISTINA DEFAULT</button>
        </div>
    </div>

    <script src="widgets.js"></script>
    <script src="app.js"></script>
</body>
</html>
