<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaMaoDash | Dashboard Navigazione</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MAMAO<span style="color: var(--text-main)">DASH</span></div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="theme-toggle" class="theme-toggle">🌓 LIGHT MODE</button>
            <button id="settings-toggle" class="theme-toggle">⚙️ SETUP</button>
            <div class="status-bar">
                <div class="status-item">
                    <div class="dot"></div>
                    <span id="mode-label">SIMULATORE</span>
                </div>
            </div>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- Widget Unificato (Prua + Vento) -->
        <section class="widget nav-main">
            <div class="widget-label">Navigazione (HDG / AWA)</div>
            <div class="gauge-container" id="nav-display-box">
                <!-- SVG caricato via JS -->
            </div>
            <div class="nav-data-overlay">
                <div class="data-box">
                    <span class="label">HDG</span>
                    <div class="value-row">
                        <span id="heading">000</span>°
                    </div>
                </div>
                <div class="data-box">
                    <span class="label">AWS</span>
                    <div class="value-row">
                        <span id="wind-speed">0.0</span><span class="unit">kn</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Velocità (SOG) -->
        <section class="widget">
            <div class="widget-label">Velocità (SOG)</div>
            <div class="widget-value" id="sog">0.0<span class="widget-unit">kn</span></div>
        </section>

        <!-- Profondità -->
        <section class="widget">
            <div class="widget-label">Profondità (DBT)</div>
            <div class="widget-value" id="depth" style="color: var(--accent-cyan)">--.-<span class="widget-unit">m</span></div>
        </section>

        <!-- Waypoint / Info -->
        <section class="widget">
            <div class="widget-label">Vento Reale (TWS)</div>
            <div class="widget-value" id="tws">0.0<span class="widget-unit">kn</span></div>
        </section>

        <!-- Tilt / Pitch -->
        <section class="widget">
            <div class="widget-label">Posizione</div>
            <div class="widget-value" id="position" style="font-size: clamp(1rem, 4vw, 1.3rem); flex-direction: column; align-items: center;">
                <div>44° 24' 12" N</div>
                <div>008° 55' 34" E</div>
            </div>
        </section>
    </main>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
        <div class="settings-header">
            <h3>PERSONALIZZA COLORI</h3>
            <button id="settings-close">×</button>
        </div>
        <div class="settings-content">
            <div class="color-group">
                <label>Sfondo (Background)</label>
                <input type="color" data-var="--bg-color" id="color-bg">
            </div>
            <div class="color-group">
                <label>Accento Ciano</label>
                <input type="color" data-var="--accent-cyan" id="color-cyan">
            </div>
            <div class="color-group">
                <label>Accento Arancio</label>
                <input type="color" data-var="--accent-orange" id="color-orange">
            </div>
            <div class="color-group">
                <label>Testo Principale</label>
                <input type="color" data-var="--text-main" id="color-text">
            </div>
            <button id="reset-colors" class="reset-btn">RIPRISTINA DEFAULT</button>
        </div>
    </div>

    <script src="widgets.js"></script>
    <script src="app.js"></script>
</body>
</html>
