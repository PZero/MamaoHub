<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#1a1a1a" />
    
    <!-- PCB Base -->
    <rect x="50" y="50" width="700" height="500" rx="10" ry="10" fill="#1e3a2a" stroke="#2d5a42" stroke-width="3" />
    
    <!-- Raspberry Pi Zero 2 W + UPS (Center) -->
    <rect x="300" y="200" width="200" height="100" rx="5" ry="5" fill="#2c3e50" stroke="#34495e" stroke-width="2" />
    <text x="310" y="255" fill="white" font-family="Arial" font-size="14">RPi Zero 2 W + X306 UPS</text>
    <rect x="480" y="225" width="20" height="40" fill="#d35400" />
    <text x="475" y="280" fill="white" font-family="Arial" font-size="10">USB-C 5V</text>

    <!-- Waveshare 4Ch -->
    <rect x="100" y="80" width="600" height="60" rx="3" ry="3" fill="#34495e" stroke="#2c3e50" stroke-width="1" />
    <text x="280" y="115" fill="white" font-family="Arial" font-size="16">WAVESHARE 4-CH RS485 to USB</text>
    
    <!-- Ports -->
    <rect x="120" y="60" width="100" height="30" fill="#7f8c8d" />
    <text x="125" y="80" fill="white" font-family="Arial" font-size="11">P1 (Vento)</text>
    
    <rect x="270" y="60" width="100" height="30" fill="#7f8c8d" />
    <text x="275" y="80" fill="white" font-family="Arial" font-size="11">P2 (Bussola)</text>
    
    <rect x="420" y="60" width="100" height="30" fill="#7f8c8d" />
    <text x="425" y="80" fill="white" font-family="Arial" font-size="11">P3 (Completo)</text>
    
    <rect x="570" y="60" width="100" height="30" fill="#7f8c8d" />
    <text x="575" y="80" fill="white" font-family="Arial" font-size="11">P4 (LIBERA)</text>

    <!-- TTL-RS485 Module -->
    <rect x="600" y="320" width="80" height="50" rx="3" ry="3" fill="#8e44ad" stroke="#7d3c98" stroke-width="1" />
    <text x="605" y="350" fill="white" font-family="Arial" font-size="11">TTL-RS485</text>

    <!-- Morsetti (Terminals) -->
    <rect x="80" y="480" width="120" height="50" rx="3" ry="3" fill="#d35400" stroke="#a84300" stroke-width="2" />
    <text x="85" y="510" fill="white" font-family="Arial" font-size="11">M1: Vento</text>
    
    <rect x="250" y="480" width="120" height="50" rx="3" ry="3" fill="#d35400" stroke="#a84300" stroke-width="2" />
    <text x="255" y="510" fill="white" font-family="Arial" font-size="11">M2: Bussola</text>
    
    <rect x="420" y="480" width="150" height="50" rx="3" ry="3" fill="#d35400" stroke="#a84300" stroke-width="2" />
    <text x="425" y="510" fill="white" font-family="Arial" font-size="11">M3: Multix (Nav In)</text>
    
    <rect x="600" y="480" width="120" height="50" rx="3" ry="3" fill="#d35400" stroke="#a84300" stroke-width="2" />
    <text x="605" y="510" fill="white" font-family="Arial" font-size="11">M4: Comp. (Nav Out)</text>

    <!-- Wiring (Traces) -->
    <!-- Vento Link -->
    <path d="M140 480 L140 90" stroke="#e67e22" fill="none" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Bussola Link -->
    <path d="M310 480 L310 90" stroke="#e67e22" fill="none" stroke-width="2" stroke-dasharray="5,5" />
    <!-- UART to TTL -->
    <path d="M500 220 L640 220 L640 320" stroke="#3498db" fill="none" stroke-width="2" />
    <!-- TTL to M3 (Input A+B for Navigator) -->
    <path d="M640 370 L640 430 L495 430 L495 480" stroke="#9b59b6" fill="none" stroke-width="2" />
    <!-- Port 3 to M4 (Complete Signal for Hub) -->
    <path d="M470 90 L470 150 L750 150 L750 480" stroke="#2ecc71" fill="none" stroke-width="2" />

    <text x="250" y="580" fill="#7f8c8d" font-family="Arial" font-size="12">Disclaimer: Schema di cablaggio concettuale (v1.0)</text>
</svg>
